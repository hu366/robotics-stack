# Controller configuration
# All gains/thresholds go here - no hardcoded constants in code

impedance:
  # Cartesian impedance controller gains
  kp_position: 100.0    # Position stiffness (N/m)
  kd_position: 10.0     # Position damping (N/(m/s))
  kp_orientation: 50.0  # Orientation stiffness (N/rad)
  kd_orientation: 5.0   # Orientation damping (N/(rad/s))

force_control:
  # Force control gains (admittance style)
  kf_normal: 0.01       # Force gain (m/N)
  df_normal: 0.001      # Force damping gain
  desired_force_normal: 10.0  # Target normal force (N)
  force_limit: 20.0     # Max allowed contact force (N)

safety:
  # Safety limits
  torque_limit: 100.0       # Max joint torque (Nm)
  velocity_limit: 1.0       # Max joint velocity (rad/s)
  force_limit: 20.0         # Max contact force (N)
  position_tolerance: 0.01  # Max tracking error (m)
  timeout_seconds: 30.0     # Node timeout

nullspace:
  # Nullspace posture control
  kp_posture: 10.0      # Joint stiffness
  kd_posture: 1.0       # Joint damping
  nominal_joint_config: [0.0, -0.78, 0.0, -2.35, 0.0, 1.57, 0.78]  # Panda default
