# Task T2: Maintain contact normal force on a plane

task_name: "force_hold"

plane:
  # Plane pose (vertical board or horizontal table)
  frame: "board"
  normal: [0, 0, 1]      # Normal vector (z-up for horizontal table)
  point: [0.45, 0.0, 0.0]  # Point on the plane

force_control:
  desired_force_normal: 10.0  # Target normal force (N)
  force_tolerance: 2.0        # Acceptable force error (N)
  force_limit: 20.0           # Max force before failure (N)

approach:
  approach_distance: 0.05   # Start force control at this distance (m)
  approach_speed: 0.01      # Approach speed (m/s)

stabilization:
  hold_duration: 2.0        # Seconds to maintain force
  oscillation_threshold: 5.0  # Max force variance for stability

retry:
  max_attempts: 3
  retreat_distance: 0.03
