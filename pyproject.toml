[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "robotics-stack"
version = "0.1.0"
description = "Simulation-only robotics stack for interpretable policy synthesis + low-level closed-loop control"
requires-python = ">=3.11"
dependencies = [
    "mujoco>=3.2.0",
    "numpy>=1.26.0",
    "scipy>=1.12.0",
    "matplotlib>=3.8.0",
    "pydantic>=2.5.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.3.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_functions = "test_*"

[tool.hatch.build.targets.wheel]
packages = ["control", "envs", "planning", "eval"]

[tool.ruff]
line-length = 100
target-version = "py311"
